<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Vanlife — Find Your Next Stop</title>
  <meta name="description" content="Van life atlas — find overnight parking, water, food, coffee, and services on the road.">

  <!-- Leaflet (free, open-source map library) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="styles.css">

  <!-- Configure the Worker URL here. After deploying your Worker, replace localhost. -->
  <script>
    window.VANLIFE_WORKER_URL = 'http://localhost:8787';
  </script>
</head>
<body>
  <div class="app">

    <!-- ─────────── TOPBAR ─────────── -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">VANLIFE</div>
        <div class="brand-tag">working title</div>
      </div>
      <div id="current-location">
        <span class="loc-label">Tap "Use my location" or search a place</span>
      </div>
    </header>

    <!-- ─────────── SHELL: panel + map ─────────── -->
    <div class="shell">

      <aside class="panel">
        <!-- search + my location -->
        <div class="search-row">
          <form id="search-form">
            <input id="search-input" type="text" placeholder="City, park, or address..." autocomplete="off">
            <button id="btn-search" type="submit">Go</button>
          </form>
          <button id="btn-location" type="button" title="Use my current location">◎ Me</button>
        </div>

        <!-- categories -->
        <div id="category-strip"></div>

        <!-- radius -->
        <div class="radius-row">
          <label for="radius-slider">Within</label>
          <input id="radius-slider" type="range" min="1000" max="80000" step="1000" value="8000">
          <span id="radius-value">5 mi</span>
        </div>

        <!-- results -->
        <ul id="results-list"></ul>
      </aside>

      <main class="map-pane">
        <div id="map"></div>
      </main>

    </div>

    <!-- ─────────── STATUS BAR ─────────── -->
    <footer class="statusbar">
      <span id="status">Awaiting input · pick a location to begin</span>
    </footer>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
